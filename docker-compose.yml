services:

  # ─── VPN ───────────────────────────────────────────────────────────────────
  # All qBittorrent traffic exits through ProtonVPN via WireGuard.
  # Credentials are read from .env — copy .env.example to .env and fill it in.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - VPN_ENDPOINT_IP=${VPN_ENDPOINT_IP}
      - VPN_ENDPOINT_PORT=${VPN_ENDPOINT_PORT:-51820}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
    ports:
      - 8080:8080   # qBittorrent Web UI — do not expose publicly
    restart: unless-stopped

  # ─── qBittorrent ───────────────────────────────────────────────────────────
  # Shares gluetun's network so ALL torrent traffic goes through the VPN.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
      - WEBUI_PORT=8080
    volumes:
      - D:\Home Media\config\qbittorrent:/config
      - D:\Home Media\Downloads:/downloads
    restart: unless-stopped
    depends_on:
      - gluetun

  # ─── Prowlarr ──────────────────────────────────────────────────────────────
  # Indexer manager. Access at http://<tailscale-hostname>:9696
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - D:\Home Media\config\prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  # ─── FlareSolverr ──────────────────────────────────────────────────────────
  # Cloudflare bypass for certain indexers. Add as proxy in Prowlarr.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-America/New_York}
    ports:
      - 8191:8191
    restart: unless-stopped

  # ─── Radarr ────────────────────────────────────────────────────────────────
  # Movies. Access at http://<tailscale-hostname>:7878
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - D:\Home Media\config\radarr:/config
      - D:\Home Media\Movies:/movies
      - D:\Home Media\Downloads:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped

  # ─── Sonarr ────────────────────────────────────────────────────────────────
  # TV shows. Access at http://<tailscale-hostname>:8989
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - D:\Home Media\config\sonarr:/config
      - D:\Home Media\TV:/tv
      - D:\Home Media\Downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped

  # ─── Tdarr ─────────────────────────────────────────────────────────────────
  # Automated transcoding for Plex compatibility. Access at http://<tailscale-hostname>:8265
  # First-run setup: enable the node, add libraries pointing at /media/movies and /media/tv,
  # then import or build a flow (community "Plex Compatible" preset recommended).
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - internalNodeIP=0.0.0.0
      - nodeName=MainNode
    volumes:
      - D:\Home Media\config\tdarr\server:/app/server
      - D:\Home Media\config\tdarr\configs:/app/configs
      - D:\Home Media\config\tdarr\logs:/app/logs
      - D:\Home Media\Movies:/media/movies
      - D:\Home Media\TV:/media/tv
      - D:\Home Media\transcode_cache:/temp
    ports:
      - 8265:8265
      - 8266:8266
    restart: unless-stopped

  # ─── n8n ───────────────────────────────────────────────────────────────────
  # Workflow automation for monitoring the media pipeline.
  # Access at http://localhost:5678
  # Plex (native) is reachable from n8n at http://host.docker.internal:32400
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    environment:
      - TZ=${TZ:-America/New_York}
      - N8N_SECURE_COOKIE=false
    volumes:
      - D:\Home Media\config\n8n:/home/node/.n8n
    ports:
      - 5678:5678
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
