services:

  # ─── VPN ───────────────────────────────────────────────────────────────────
  # All qBittorrent traffic exits through ProtonVPN via WireGuard.
  # Credentials are read from .env — copy .env.example to .env and fill it in.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - VPN_ENDPOINT_IP=${VPN_ENDPOINT_IP}
      - VPN_ENDPOINT_PORT=${VPN_ENDPOINT_PORT:-51820}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
    ports:
      - 8080:8080   # qBittorrent Web UI — do not expose publicly
    restart: unless-stopped

  # ─── qBittorrent ───────────────────────────────────────────────────────────
  # Shares gluetun's network so ALL torrent traffic goes through the VPN.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
      - WEBUI_PORT=8080
    volumes:
      - D:\Home Media\config\qbittorrent:/config
      - D:\Home Media\Downloads:/downloads
    restart: unless-stopped
    depends_on:
      - gluetun

  # ─── Prowlarr ──────────────────────────────────────────────────────────────
  # Indexer manager. Access at http://<tailscale-hostname>:9696
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - D:\Home Media\config\prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  # ─── FlareSolverr ──────────────────────────────────────────────────────────
  # Cloudflare bypass for certain indexers. Add as proxy in Prowlarr.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-America/New_York}
    ports:
      - 8191:8191
    restart: unless-stopped

  # ─── Radarr ────────────────────────────────────────────────────────────────
  # Movies. Access at http://<tailscale-hostname>:7878
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - D:\Home Media\config\radarr:/config
      - D:\Home Media\Movies:/movies
      - D:\Home Media\Downloads:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped

  # ─── Sonarr ────────────────────────────────────────────────────────────────
  # TV shows. Access at http://<tailscale-hostname>:8989
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - D:\Home Media\config\sonarr:/config
      - D:\Home Media\TV:/tv
      - D:\Home Media\Downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
